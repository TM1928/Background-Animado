<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background Animation - High Density</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Arial Black', Gadget, sans-serif;
        }

        /* Fundo Gradiente */
        .main-container {
            width: 100%;
            height: 100vh;
            background: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Texto Centralizado e Robusto */
        .text-overlay {
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        .text-overlay h1 {
            color: #ffffff;
            font-size: 4rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            white-space: nowrap;
            padding: 10px 0;
            border-top: 6px solid #fff; /* Linha mais grossa */
            border-bottom: 6px solid #fff;
            line-height: 1;
        }

        /* Container dos Cubos */
        .cubes-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .cube {
            position: absolute;
            list-style: none;
            display: block;
            background: rgba(255, 255, 255, 0.8); /* Cubos bem mais brancos */
            bottom: -150px;
            animation: flyAndRotate 15s linear infinite;
        }

        /* Aumento da frequência e variação */
        .cube:nth-child(1) { left: 5%; width: 40px; height: 40px; animation-delay: 0s; }
        .cube:nth-child(2) { left: 15%; width: 20px; height: 20px; animation-delay: 1s; animation-duration: 10s; }
        .cube:nth-child(3) { left: 25%; width: 70px; height: 70px; animation-delay: 2s; }
        .cube:nth-child(4) { left: 35%; width: 50px; height: 50px; animation-delay: 0s; animation-duration: 12s; }
        .cube:nth-child(5) { left: 45%; width: 30px; height: 30px; animation-delay: 3s; }
        .cube:nth-child(6) { left: 55%; width: 90px; height: 90px; animation-delay: 1.5s; }
        .cube:nth-child(7) { left: 65%; width: 45px; height: 45px; animation-delay: 4s; }
        .cube:nth-child(8) { left: 75%; width: 110px; height: 110px; animation-delay: 0.5s; animation-duration: 18s; }
        .cube:nth-child(9) { left: 85%; width: 25px; height: 25px; animation-delay: 2.5s; }
        .cube:nth-child(10) { left: 95%; width: 60px; height: 60px; animation-delay: 5s; }
        .cube:nth-child(11) { left: 10%; width: 35px; height: 35px; animation-delay: 6s; }
        .cube:nth-child(12) { left: 40%; width: 80px; height: 80px; animation-delay: 7s; }
        .cube:nth-child(13) { left: 70%; width: 20px; height: 20px; animation-delay: 8s; }
        .cube:nth-child(14) { left: 20%; width: 55px; height: 55px; animation-delay: 4.5s; }
        .cube:nth-child(15) { left: 80%; width: 40px; height: 40px; animation-delay: 9s; }

        @keyframes flyAndRotate {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.8; /* Aparece rápido */
            }
            85% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(-120vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="text-overlay">
            <h1>BACKGROUND ANIMATION</h1>
        </div>

        <div class="cubes-area">
            <div class="cube"></div>
            <div class="cube"></div>
            <div class="cube"></div>
            <div class="cube"></div>
            <div class="cube"></div>
            <div class="cube"></div>
            <div class="cube"></div>
            <div class="cube"></div>
            <div class="cube"></div>
            <div class="cube"></div>
            <div class="cube"></div>
            <div class="cube"></div>
            <div class="cube"></div>
            <div class="cube"></div>
            <div class="cube"></div>
        </div>
    </div>

</body>
</html>
